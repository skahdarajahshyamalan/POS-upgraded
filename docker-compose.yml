version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos_app
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: pos_db
    restart: always
    environment:
      MYSQL_DATABASE: atpoxise_posvtventsys
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./atpoxise_posvtventsys.sql:/docker-entrypoint-initdb.d/atpoxise_posvtventsys.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pos_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: pos_user
      PMA_PASSWORD: pos_password
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - db

volumes:
  db_data:
