version: '3.8'
services:

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ultimate-pos-app
    container_name: ultimate-pos-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - pos-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: ultimate-pos-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - pos-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ultimate-pos-db
    restart: unless-stopped
    tty: true
    ports:
      - "33066:3306"
    environment:
      MYSQL_DATABASE: ultimate_pos
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
